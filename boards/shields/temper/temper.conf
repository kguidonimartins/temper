# Deep sleep (sys_poweroff after idle): requires unplugged USB for sleep to run
# (see zmk/app/src/activity.c: is_usb_power_present()).
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_TIMEOUT=15000
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=60000

# Bluetooth — lower duty cycle while connected (optional tuning)
CONFIG_BT_MAX_CONN=1
CONFIG_BT_CTLR_TX_PWR_MINUS_20=y
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=200
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=400
CONFIG_BT_PERIPHERAL_PREF_LATENCY=15
CONFIG_BT_CTLR_LOW_LAT=n
CONFIG_BT_CTLR_LLL_PREF=n
CONFIG_BT_HCI_VS=n

# Disable unused subsystems
CONFIG_ZMK_RGB_UNDERGLOW=n
CONFIG_WS2812_STRIP=n
CONFIG_ZMK_DISPLAY=n
CONFIG_LED=n
CONFIG_PWM=n
CONFIG_SERIAL=n
CONFIG_UART_CONSOLE=n
CONFIG_USB_UART_CONSOLE=n
CONFIG_SHELL=n

# USB logging pulls in USB + blocks deep sleep whenever the cable supplies VBUS.
# Uncomment only while debugging.
# CONFIG_ZMK_USB_LOGGING=y

# https://github.com/itouuuuuuuuu/zmk-battery-bar
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
